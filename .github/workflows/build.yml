name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Android32
          os: ubuntu-latest
          target: Android32

        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ZBOT_GITHUB_PAT || secrets.GITHUB_TOKEN }}
          submodules: 'recursive'

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}
          cli: "latest"
          sdk: "nightly"

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: ['package']
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read mod version from mod.json
        id: modver
        run: |
          set -e
          ver=$(jq -r .version mod.json)
          if [[ -z "$ver" || "$ver" == "null" ]]; then
            echo "::error::No version in mod.json"
            exit 1
          fi
          # normalize to vX.Y.Z
          if [[ "$ver" != v* ]]; then
            ver="v$ver"
          fi
          if [[ ! "$ver" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$ver' in mod.json is not vX.Y.Z"
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Releasing as $ver"

      - name: Extract changelog section for this version
        id: changelog
        run: |
          set -e
          ver="${{ steps.modver.outputs.version }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "No CHANGELOG.md, skipping section extraction."
            echo "body=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pull lines from "## $ver" up to (but not including) the next "## " heading.
          section=$(awk -v ver="$ver" '
            $0 ~ "^## "ver"( |$)" {flag=1; next}
            flag && /^## / {flag=0}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$section" ]; then
            echo "No CHANGELOG section found for $ver."
            echo "body=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo 'body<<CHANGELOG_EOF'
            echo "$section"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: Build Output
          path: ./release-files

      - name: List downloaded files
        run: ls -la ./release-files

      - name: Verify .geode files exist
        run: |
          set -e
          if ! ls ./release-files/*.geode 1> /dev/null 2>&1; then
            echo "::error::No .geode files in build output"
            exit 1
          fi
          echo ".geode files to upload:"
          ls -la ./release-files/*.geode

      # Replace any existing release/tag with the same version so we can
      # republish (e.g. workflow rerun for the same mod.json version)
      # without duplicate-asset upload errors.
      - name: Delete previous release with same tag (if it exists)
        env:
          GH_TOKEN: ${{ secrets.ZBOT_GITHUB_PAT || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.modver.outputs.version }}
        run: |
          set -e
          echo "Looking for existing release with tag '$TAG'..."
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Deleting existing release $TAG..."
            gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag
          else
            echo "No existing release for $TAG."
          fi

      - name: Publish ${{ steps.modver.outputs.version }} GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.modver.outputs.version }}
          name: ZBOT-MOBILE ${{ steps.modver.outputs.version }}
          body: |
            Automated Android build of ZBOT-MOBILE ${{ steps.modver.outputs.version }}.

            ${{ steps.changelog.outputs.body }}

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message }}

            ### Install
            Download the `.geode` file below and drop it in:
            `/storage/emulated/0/Android/media/com.geode.launcher/game/geode/mods/`

            Macros will be saved to:
            `/storage/emulated/0/Android/media/com.geode.launcher/game/geode/macros/`
          files: ./release-files/*.geode
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: "true"
          token: ${{ secrets.ZBOT_GITHUB_PAT || secrets.GITHUB_TOKEN }}
