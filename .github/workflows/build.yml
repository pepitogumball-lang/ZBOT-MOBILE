name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Android32
          os: ubuntu-latest
          target: Android32

        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ZBOT_GITHUB_PAT || secrets.GITHUB_TOKEN }}
          submodules: 'recursive'

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}
          cli: "latest"
          sdk: "nightly"

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: ['package']
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: Build Output
          path: ./release-files

      - name: List downloaded files
        run: ls -la ./release-files

      # Wipe the previous "latest" release + tag so the new one fully
      # replaces it (assets, body, timestamp). Without this, uploads
      # would fail on duplicate filenames and the release page would
      # accumulate stale artifacts.
      - name: Delete previous "latest" release
        env:
          GH_TOKEN: ${{ secrets.ZBOT_GITHUB_PAT || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          echo "Looking for existing release with tag 'latest'..."
          if gh release view latest --repo "$REPO" >/dev/null 2>&1; then
            echo "Deleting existing release..."
            gh release delete latest --repo "$REPO" --yes --cleanup-tag
          else
            echo "No existing 'latest' release."
          fi

      - name: Publish rolling "latest" GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ZBOT-MOBILE (latest build)
          body: |
            Automated Android build of ZBOT-MOBILE — this release is
            replaced every time `main` is updated, so the files below
            are always the freshest build.

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message }}

            ### Install
            Download the `.geode` file below and drop it in:
            `/storage/emulated/0/Android/media/com.geode.launcher/game/geode/mods/`

            Macros will be saved to:
            `/storage/emulated/0/Android/media/com.geode.launcher/game/geode/macros/`
          files: ./release-files/*
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: "true"
          token: ${{ secrets.ZBOT_GITHUB_PAT || secrets.GITHUB_TOKEN }}
