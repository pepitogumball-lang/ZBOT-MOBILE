name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Android32
          os: ubuntu-latest
          target: Android32

        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ZBOT_GITHUB_PAT || secrets.GITHUB_TOKEN }}
          submodules: 'recursive'

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}
          cli: "latest"
          sdk: "nightly"

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: ['package']
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: Build Output
          path: ./release-files

      - name: List downloaded files
        run: ls -la ./release-files

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: ZBOT-MOBILE build #${{ github.run_number }}
          body: |
            Automated Android build of ZBOT-MOBILE.

            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message }}

            ### Install
            Download the `.geode` file below and drop it in:
            `/storage/emulated/0/Android/media/com.geode.launcher/game/geode/mods/`

            Macros will be saved to:
            `/storage/emulated/0/Android/media/com.geode.launcher/game/geode/macros/`
          files: ./release-files/*
          prerelease: false
          token: ${{ secrets.ZBOT_GITHUB_PAT || secrets.GITHUB_TOKEN }}
